<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop All Products | Urban Threads</title>
<meta name="description" content="Browse the full Urban Threads collection — outerwear, denim, knitwear, activewear and accessories. Filter by category, size and price.">
<link rel="canonical" href="https://urbanthreads.example.com/products.html">
<meta property="og:type" content="website">
<meta property="og:title" content="Shop All Products | Urban Threads">
<meta property="og:description" content="Browse the full Urban Threads collection with filters for category, size and price.">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/header.css">
<link rel="stylesheet" href="assets/css/footer.css">
<link rel="stylesheet" href="assets/css/product-card.css">
<link rel="stylesheet" href="assets/css/products.css">
</head>
<body data-page="products" data-base="">

<div id="ut-header"></div>

<main id="main-content">
  <div class="products-header">
    <div class="container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">Home</a>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        <span>Shop</span>
      </nav>
      <h1 id="products-title">All Products</h1>
    </div>
  </div>

  <div class="container">
    <div class="products-layout">

      <aside class="filters-panel" id="filters-panel" aria-label="Filters">
        <div class="flex-between" style="margin-bottom:var(--space-4)">
          <h3 class="text-h5">Filters</h3>
          <button class="icon-btn" id="filters-close-btn" aria-label="Close filters">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div class="filter-group">
          <p class="filter-group-title">Category</p>
          <div id="category-filters"></div>
        </div>

        <div class="filter-group">
          <p class="filter-group-title">Size</p>
          <div class="size-grid" id="size-filters"></div>
        </div>

        <div class="filter-group">
          <p class="filter-group-title">Max Price</p>
          <div class="price-range">
            <input type="range" id="price-range-input" min="500" step="100">
            <div class="price-range-value"><span>₹0</span><span id="price-range-max"></span></div>
          </div>
        </div>

        <button class="btn btn-outline btn-block" id="clear-filters-btn" style="margin-top:var(--space-5)">Clear All Filters</button>
      </aside>

      <div>
        <div class="toolbar">
          <div class="toolbar-left">
            <button class="btn btn-secondary filter-toggle-btn" id="filter-toggle-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
              Filters
            </button>
            <p class="results-count" id="results-count"></p>
          </div>
          <div class="toolbar-left">
            <div class="toolbar-search input-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
              <input type="text" class="input" id="toolbar-search-input" placeholder="Search products...">
            </div>
            <select class="select" id="sort-select" aria-label="Sort products">
              <option value="featured">Featured</option>
              <option value="newest">Newest</option>
              <option value="bestseller">Best Selling</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="rating">Highest Rated</option>
            </select>
          </div>
        </div>

        <div class="active-filters" id="active-filters" hidden></div>

        <div class="product-grid" id="products-grid"></div>
        <div class="pagination" id="pagination"></div>
      </div>

    </div>
  </div>
</main>

<div id="ut-footer"></div>

<script src="assets/js/core/sanity-client.js"></script>
<script src="assets/js/core/db.js"></script>
<script src="assets/js/core/utils.js"></script>
<script src="assets/js/core/theme.js"></script>
<script src="assets/js/core/toast.js"></script>
<script src="assets/js/core/modal.js"></script>
<script src="assets/js/core/cart.js"></script>
<script src="assets/js/core/analytics.js"></script>
<script src="assets/js/components/product-card.js"></script>
<script src="assets/js/components/quick-view.js"></script>
<script src="assets/js/components/header.js"></script>
<script src="assets/js/components/footer.js"></script>
<script src="assets/js/core/app-init.js"></script>
<script src="assets/js/pages/products.js"></script>
</body>
</html>
