<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Urban Threads</title>
<meta name="description" content="Complete your Urban Threads order via WhatsApp checkout.">
<link rel="canonical" href="https://urbanthreads.example.com/checkout.html">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/header.css">
<link rel="stylesheet" href="assets/css/footer.css">
<link rel="stylesheet" href="assets/css/cart.css">
<link rel="stylesheet" href="assets/css/checkout.css">
</head>
<body data-page="checkout" data-base="">

<div id="ut-header"></div>

<main id="main-content">
  <div class="container section-sm">
    <div class="checkout-steps">
      <div class="checkout-step done"><span class="num">✓</span> Bag</div>
      <div class="checkout-step-sep"></div>
      <div class="checkout-step active"><span class="num">2</span> Details</div>
      <div class="checkout-step-sep"></div>
      <div class="checkout-step"><span class="num">3</span> WhatsApp Confirm</div>
    </div>

    <div class="checkout-layout">
      <div>
        <h1 class="text-h3" style="margin-bottom:var(--space-6)">Delivery Details</h1>
        <form id="checkout-form" class="card card-pad" novalidate>
          <div class="field">
            <label class="label" for="name">Full Name</label>
            <input class="input" id="name" name="name" required placeholder="Jordan Lee">
          </div>
          <div class="field">
            <label class="label" for="phone">Phone Number</label>
            <input class="input" id="phone" name="phone" type="tel" required placeholder="+91 98765 43210">
          </div>
          <div class="field">
            <label class="label" for="address">Address</label>
            <textarea class="textarea" id="address" name="address" required placeholder="House no., street, landmark" style="min-height:80px"></textarea>
          </div>
          <div class="field-row">
            <div class="field">
              <label class="label" for="city">City</label>
              <input class="input" id="city" name="city" required placeholder="Mumbai">
            </div>
            <div class="field">
              <label class="label" for="state">State</label>
              <input class="input" id="state" name="state" required placeholder="Maharashtra">
            </div>
          </div>
          <div class="field">
            <label class="label" for="pin">PIN Code</label>
            <input class="input" id="pin" name="pin" required pattern="[0-9]{6}" maxlength="6" placeholder="400001">
          </div>
          <div class="field">
            <label class="label" for="notes">Order Notes <span class="label-optional">(optional)</span></label>
            <textarea class="textarea" id="notes" name="notes" placeholder="Delivery instructions, gift note, etc."></textarea>
          </div>
          <button type="submit" class="btn btn-whatsapp btn-lg btn-block">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 00-8.6 15L2 22l5.2-1.4A10 10 0 1012 2zm5.8 14.3c-.2.7-1.4 1.4-2 1.5-.5.1-1.1.1-1.8-.1a13.8 13.8 0 01-5-3.2 13.8 13.8 0 01-2.9-4.6c-.3-.7-.1-1.4.4-2 .3-.3.6-.5 1-.5h.4c.2 0 .5 0 .7.5l1 2.3c.1.3 0 .6-.1.8l-.5.6c-.2.2-.3.4-.1.7a9 9 0 004 4c.3.2.5.1.7-.1l.6-.6c.2-.2.5-.3.8-.1l2.2 1.1c.3.1.5.4.5.7.1.2.1.6-.1.9z"/></svg>
            Order on WhatsApp
          </button>
        </form>
      </div>

      <div>
        <div class="card card-pad" style="margin-bottom:var(--space-6)">
          <h3 class="text-h5" style="margin-bottom:var(--space-4)">Order Summary</h3>
          <div class="checkout-order-items" id="checkout-order-items"></div>
          <div id="checkout-totals"></div>
        </div>

        <div class="card card-pad">
          <h3 class="text-h5" style="margin-bottom:var(--space-3)">WhatsApp Message Preview</h3>
          <p class="text-secondary" style="font-size:var(--fs-xs);margin-bottom:var(--space-4)">This is exactly what will be sent when you tap "Order on WhatsApp".</p>
          <div class="wa-preview" id="wa-preview"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="ut-footer"></div>

<script src="assets/js/core/sanity-client.js"></script>
<script src="assets/js/core/db.js"></script>
<script src="assets/js/core/utils.js"></script>
<script src="assets/js/core/theme.js"></script>
<script src="assets/js/core/toast.js"></script>
<script src="assets/js/core/modal.js"></script>
<script src="assets/js/core/cart.js"></script>
<script src="assets/js/core/analytics.js"></script>
<script src="assets/js/components/product-card.js"></script>
<script src="assets/js/components/quick-view.js"></script>
<script src="assets/js/components/header.js"></script>
<script src="assets/js/components/footer.js"></script>
<script src="assets/js/core/app-init.js"></script>
<script src="assets/js/pages/checkout.js"></script>
</body>
</html>
